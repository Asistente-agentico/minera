# docker-compose.chat.yml — Suite E2E chat (read path)
#
# Levanta MK -> MV -> MA + M2.
# MA (8001), M2 (8000) y MV (8002) se exponen al host para pytest y health checks.
#
# Prerrequisito: datos/qdrant_mv/ poblada por run_e2e_ingesta.ps1 / run_e2e_ingesta.sh.
#
# Uso (desde la raíz del repo minera):
#   MASTER_SECRET=xxx docker compose -f docker-compose.chat.yml up -d
#   docker compose -f docker-compose.chat.yml down --remove-orphans
#
# Variables de entorno:
#   MASTER_SECRET      — secreto de cifrado (obligatorio)
#   ILLARI_MK_IMAGE    — override imagen mk  (default: illari-mk:local)
#   ILLARI_MV_IMAGE    — override imagen mv  (default: illari-mv:local)
#   ILLARI_MA_IMAGE    — override imagen ma  (default: illari-ma:local)
#   ILLARI_M2_IMAGE    — override imagen m2  (default: illari-m2:local)
#   CHAT_YAML          — yaml de config del LLM (default: ./configuracion/chat.eco.yaml)
#   M2_PIP_EXTRA       — paquetes extra para M2 (p.ej. google-genai para Gemini)
#   GEMINI_API_KEY     — clave API Gemini (solo si M2_PIP_EXTRA incluye google-genai)

x-base: &base
  volumes:
    - .:/cliente/minera
  networks: [red_illari]

services:

  mk:
    <<: *base
    image: ${ILLARI_MK_IMAGE:-illari-mk:local}
    entrypoint: python -m mk.api.main
    environment:
      MASTER_SECRET: ${MASTER_SECRET}
      MK_PORT: "8003"
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8003/health')"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  mv-api:
    <<: *base
    image: ${ILLARI_MV_IMAGE:-illari-mv:local}
    user: "0"
    entrypoint: uvicorn mv.api.main:app --host 0.0.0.0 --port 8002
    volumes:
      - .:/cliente/minera
      - ./datos/fastembed_cache:/home/asistente/.cache:ro
    depends_on:
      mk:
        condition: service_healthy
    ports:
      - "8002:8002"
    environment:
      MK_URL: "http://mk:8003"
      CLIENTE_DIR: /cliente/minera
      MV_PORT: "8002"
      FASTEMBED_CACHE_PATH: /home/asistente/.cache
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')"]
      interval: 5s
      timeout: 3s
      retries: 24
      start_period: 30s

  ma:
    <<: *base
    image: ${ILLARI_MA_IMAGE:-illari-ma:0.1.0}
    entrypoint: uvicorn ma.api.main:app --host 0.0.0.0 --port 8001
    environment:
      CLIENTE_DIR: /cliente/minera
      # Hashes bcrypt (cost=4) de la contraseña de prueba 'test-illari-2026'.
      # Los $$ son el escape de $ en docker compose (resultado: $2b$04$...).
      MA_USER_HASH_amVmZS5zZWd1cmlkYWRAdGVzdA: "$$2b$$04$$S5S3tejM5JDZjzSbSPIIr.JAMtP4oMpKgT/UzzWSw3/qCS.joIaJq"
      MA_USER_HASH_b3BlcmFkb3IuY2hhbmNhZG9AdGVzdA: "$$2b$$04$$S5S3tejM5JDZjzSbSPIIr.JAMtP4oMpKgT/UzzWSw3/qCS.joIaJq"
      MA_USER_HASH_YXVkaXRvci5hbWJpZW50YWxAdGVzdA: "$$2b$$04$$S5S3tejM5JDZjzSbSPIIr.JAMtP4oMpKgT/UzzWSw3/qCS.joIaJq"
      MA_USER_HASH_dGVjbmljby5tZWRpb2FtYmllbnRlLm1vbGllbmRhQHRlc3Q: "$$2b$$04$$S5S3tejM5JDZjzSbSPIIr.JAMtP4oMpKgT/UzzWSw3/qCS.joIaJq"
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  m2:
    <<: *base
    image: ${ILLARI_M2_IMAGE:-illari-m2:0.1.0}
    entrypoint:
      - sh
      - -c
      - >-
        if [ -n "${M2_PIP_EXTRA:-}" ]; then pip install ${M2_PIP_EXTRA} -q 2>/dev/null; fi &&
        python -m m2.core.cli serve --dev --raiz /cliente/minera --host 0.0.0.0 --port 8000
    volumes:
      - .:/cliente/minera
      - ../Illari/m2/configuracion/schemas:/app/m2/configuracion/schemas:ro
      - ../Illari/m2/core/adaptadores/llm/factory.py:/app/m2/core/adaptadores/llm/factory.py:ro
      - ${CHAT_YAML:-./configuracion/chat.eco.yaml}:/cliente/minera/configuracion/chat.yaml:ro
    depends_on:
      mv-api:
        condition: service_started
      ma:
        condition: service_healthy
    environment:
      CLIENTE_DIR: /cliente/minera
      MA_JWKS_URL: "http://ma:8001/jwks"
      M2_PIP_EXTRA: ${M2_PIP_EXTRA:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 15s

networks:
  red_illari:
    driver: bridge
