# Suite E2E ingesta (M1) — caso Minera
# Dominio: seguridad ocupacional — concentración de polvo respirable (DS 594).
#
# Valida que el pipeline M1 (dbt + chunker) produzca los chunks esperados:
#   dbt (parse + test source + snapshot + run + test) → generar_chunks_para_mv
#
# El cifrado AES-GCM y el upsert Qdrant los realiza MV al recibir los chunks.
# La validación de almacenamiento en Qdrant queda diferida hasta que mk/ esté
# incluido en la imagen Docker (deuda: Dockerfile sin COPY mk/).
#
# Ejecutar desde el repo Illari:
#   export ILLARI_E2E_INGESTA=/ruta/a/minera/tests/e2e_escritura.yaml
#   export ILLARI_E2E_RAIZ=/ruta/a/minera
#   pytest tests/e2e_escritura/test_pipeline.py -v -m e2e
#
# O desde minera usando el script:
#   bash scripts/run_e2e_ingesta.sh
#
# Prerequisito: datos/minera.duckdb con seeds cargados (dbt seed ejecutado).

suite: minera_ingesta
version: "1.0"
descripcion: "Pipeline M1: dbt + chunker → chunks_generados_dev.json validado por regla"

total:
  min_chunks: 55   # 67 en dataset completo; margen para seeds parciales

reglas:

  # ── P00001_M00001 — Puntos sobre el límite esta semana ───────────────────
  # 17 chunks en dataset completo (una fila por punto que supera 2.5 mg/m³).
  # clasificacion=restringido porque incluye nombres de operador y técnico.
  - regla_id: P00001_M00001
    descripcion: "Puntos sobre límite esta semana"
    min_chunks: 12
    dimensiones_requeridas:
      ambito: seguridad_ocupacional
      clasificacion: restringido
    pii_claves:
      - operador
      - tecnico

  # ── P00002_M00002 — Resumen anual por área ───────────────────────────────
  # 16 chunks en dataset completo (una fila por planta con estadísticas anuales).
  # clasificacion=interno sin PII declarado: pii_tokens debe ser dict vacío.
  - regla_id: P00002_M00002
    descripcion: "Resumen anual por área"
    min_chunks: 10
    dimensiones_requeridas:
      ambito: seguridad_ocupacional
      clasificacion: interno
    pii_claves: []

  # ── P00003_M00003 — Condiciones del peak histórico ───────────────────────
  # 8 chunks en dataset completo (una fila por planta con el máximo histórico).
  # clasificacion=restringido con PII extendido: operador_dni y tecnico_dni
  # adicionalmente a los nombres.
  - regla_id: P00003_M00003
    descripcion: "Peak histórico por planta"
    min_chunks: 5
    dimensiones_requeridas:
      ambito: seguridad_ocupacional
      clasificacion: restringido
    pii_claves:
      - operador
      - operador_dni
      - tecnico
      - tecnico_dni

  # ── P00004_M00004 — Última jornada de medición ───────────────────────────
  # 26 chunks en dataset completo (todas las mediciones de la sesión más reciente).
  # clasificacion=interno con PII básico (nombres sin DNI).
  - regla_id: P00004_M00004
    descripcion: "Última jornada de medición"
    min_chunks: 15
    dimensiones_requeridas:
      ambito: seguridad_ocupacional
      clasificacion: interno
    pii_claves:
      - operador
      - tecnico
