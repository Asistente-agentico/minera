# Suite E2E reportes (M3) — caso Minera
# Dominio: seguridad ocupacional — concentración de polvo respirable (DS 594).
#
# Ejecutar desde el repo Illari:
#   export ILLARI_E2E_M3=/ruta/a/minera/tests/e2e_informes-consumir.yaml
#   export ILLARI_E2E_CLIENTE=/ruta/a/minera
#   pytest tests/e2e_m3/ -v -m e2e
#
# Prerequisito: dbt run ejecutado (datos/minera.duckdb con vista oro_p00002).
# No requiere MASTER_SECRET (M3 no usa MV ni Qdrant).
#
# Reporte probado: concentracion_anual (oro_p00002).
#   16 filas = 8 plantas × 2 años (2025 y 2026).
#   Gobernanza activa: solo planta (tipo enum, dimensiones_requeridas=[planta]).
#   ambito y clasificacion del JWT no aplican (oro_p00002 no tiene esas columnas).
#
# Perfiles (permisos.yaml):
#   jefe_seguridad        → planta=["Todas"]    → 8 plantas → 16 filas
#   operador_chancado     → planta=["Chancado"] → 5 plantas → 10 filas
#   auditor_ambiental     → planta=["Todas"]    → 8 plantas → 16 filas
#   tecnico_molienda      → planta=["Molienda"] → 3 plantas →  6 filas

suite: minera_m3
version: "1.0"
descripcion: "Reportes M3 — concentración anual por planta (oro_p00002), 4 perfiles"

perfiles:
  - id: jefe_seguridad
    descripcion: "Jefe de seguridad — todas las plantas (grupo todas)"
    user_id: "jefe.seguridad@test"
    contrasena_test: "test-illari-2026"

  - id: operador_chancado
    descripcion: "Operador chancado — 5 plantas (grupo chancado)"
    user_id: "operador.chancado@test"
    contrasena_test: "test-illari-2026"

  - id: auditor_ambiental
    descripcion: "Auditor ambiental — todas las plantas (grupo todas, ambito todos)"
    user_id: "auditor.ambiental@test"
    contrasena_test: "test-illari-2026"

  - id: tecnico_molienda
    descripcion: "Técnico de Medioambiente — 3 plantas (grupo Molienda)"
    user_id: "tecnico.medioambiente.molienda@test"
    contrasena_test: "test-illari-2026"

escenarios:

  # ── Autenticación ─────────────────────────────────────────────────────────

  - id: sin_jwt
    reporte: concentracion_anual
    parametros: {}
    espera:
      status: 401

  - id: jwt_invalido
    reporte: concentracion_anual
    token_literal: "esto_no_es_un_jwt"
    parametros: {}
    espera:
      status: 401

  # ── Listado de reportes ───────────────────────────────────────────────────
  # GET /reportes/ lista los reportes disponibles.

  - id: listar_reportes
    operacion: listar
    perfil: auditor_ambiental
    espera:
      status: 200
      reportes_presentes:
        - concentracion_anual

  # ── Reporte inexistente ───────────────────────────────────────────────────

  - id: reporte_inexistente
    reporte: reporte_que_no_existe
    perfil: auditor_ambiental
    parametros: {}
    espera:
      status: 404

  # ── Gobernanza: acceso completo (8 plantas) ──────────────────────────────
  # auditor_ambiental y jefe_seguridad tienen planta=["Todas"] → 16 filas.

  - id: auditor_todas_plantas
    reporte: concentracion_anual
    perfil: auditor_ambiental
    parametros: {}
    espera:
      status: 200
      filas_exactas: 16

  - id: jefe_todas_plantas
    reporte: concentracion_anual
    perfil: jefe_seguridad
    parametros: {}
    espera:
      status: 200
      filas_exactas: 16

  # ── Gobernanza: acceso restringido por grupo ──────────────────────────────
  # operador_chancado tiene planta=["Chancado"] → 5 plantas → 10 filas (5 × 2 años).

  - id: operador_grupo_chancado
    reporte: concentracion_anual
    perfil: operador_chancado
    parametros: {}
    espera:
      status: 200
      filas_exactas: 10
      plantas_presentes: ["Pre-Chancado", "Chancado 2° y 3°"]
      plantas_excluidas: ["Molienda SAG", "CDM"]

  # tecnico_molienda tiene planta=["Molienda"] → 3 plantas → 6 filas (3 × 2 años).
  # Su ambito="Medioambiente" no está en oro_p00002; dimensiones_requeridas=[planta]
  # filtra el WHERE a solo planta.

  - id: tecnico_grupo_molienda
    reporte: concentracion_anual
    perfil: tecnico_molienda
    parametros: {}
    espera:
      status: 200
      filas_exactas: 6
      plantas_presentes: ["Molienda SAG", "CDM"]
      plantas_excluidas: ["Pre-Chancado", "Nodo 3500"]

  # ── Parámetro opcional anio ───────────────────────────────────────────────
  # auditor + anio=2026 → 8 filas (una por planta, solo año 2026).

  - id: auditor_filtro_anio_2026
    reporte: concentracion_anual
    perfil: auditor_ambiental
    parametros:
      anio: 2026
    espera:
      status: 200
      filas_exactas: 8

  # auditor + anio=2025 → 8 filas.

  - id: auditor_filtro_anio_2025
    reporte: concentracion_anual
    perfil: auditor_ambiental
    parametros:
      anio: 2025
    espera:
      status: 200
      filas_exactas: 8

  # operador + anio=2026 → 5 filas (5 plantas chancado, año 2026).

  - id: operador_filtro_anio_2026
    reporte: concentracion_anual
    perfil: operador_chancado
    parametros:
      anio: 2026
    espera:
      status: 200
      filas_exactas: 5

  # tecnico + anio=2025 → 3 filas (3 plantas molienda, año 2025).

  - id: tecnico_filtro_anio_2025
    reporte: concentracion_anual
    perfil: tecnico_molienda
    parametros:
      anio: 2025
    espera:
      status: 200
      filas_exactas: 3

  # ── GET /reportes/catalogo ────────────────────────────────────────────────

  - id: catalogo_sin_jwt
    operacion: catalogo
    espera:
      status: 401

  - id: catalogo_shape
    operacion: catalogo
    perfil: auditor_ambiental
    espera:
      status: 200
      reportes_presentes:
        - concentracion_anual
      campos_item:
        - id
        - nombre
        - formatos
        - habilitado_para_usuario

  # ── GET /reportes/{id}/consumir ───────────────────────────────────────────

  - id: consumir_sin_jwt
    operacion: consumir
    reporte: concentracion_anual
    parametros: {}
    espera:
      status: 401

  - id: consumir_reporte_inexistente
    operacion: consumir
    reporte: reporte_que_no_existe
    perfil: auditor_ambiental
    parametros: {}
    espera:
      status: 404

  # consumir espeja la gobernanza de generar: mismas filas, mismo filtrado.

  - id: consumir_auditor_todas_plantas
    operacion: consumir
    reporte: concentracion_anual
    perfil: auditor_ambiental
    parametros: {}
    espera:
      status: 200
      filas_exactas: 16
      campos_fila:
        - planta
        - anio

  - id: consumir_operador_grupo_chancado
    operacion: consumir
    reporte: concentracion_anual
    perfil: operador_chancado
    parametros: {}
    espera:
      status: 200
      filas_exactas: 10
      campos_fila: [planta, anio]
      plantas_presentes: ["Pre-Chancado", "Chancado 2° y 3°"]
      plantas_excluidas: ["Molienda SAG", "CDM"]

  - id: consumir_tecnico_grupo_molienda
    operacion: consumir
    reporte: concentracion_anual
    perfil: tecnico_molienda
    parametros: {}
    espera:
      status: 200
      filas_exactas: 6
      campos_fila: [planta, anio]
      plantas_presentes: ["Molienda SAG", "CDM"]
      plantas_excluidas: ["Pre-Chancado", "Nodo 3500"]

  # consumir + parámetro anio como query string (?anio=2026).

  - id: consumir_filtro_anio_2026
    operacion: consumir
    reporte: concentracion_anual
    perfil: auditor_ambiental
    parametros:
      anio: 2026
    espera:
      status: 200
      filas_exactas: 8
      campos_fila:
        - planta
        - anio

  # consumir + filtro_anio para perfiles restringidos (simetría con generar).

  - id: consumir_operador_filtro_anio_2026
    operacion: consumir
    reporte: concentracion_anual
    perfil: operador_chancado
    parametros:
      anio: 2026
    espera:
      status: 200
      filas_exactas: 5
      plantas_excluidas: ["Molienda SAG", "CDM"]

  - id: consumir_tecnico_filtro_anio_2025
    operacion: consumir
    reporte: concentracion_anual
    perfil: tecnico_molienda
    parametros:
      anio: 2025
    espera:
      status: 200
      filas_exactas: 3
      plantas_excluidas: ["Pre-Chancado", "Nodo 3500"]

  # ── Multi-formato: concentracion_anual en Excel ───────────────────────────

  - id: concentracion_formato_excel
    operacion: consumir
    reporte: concentracion_anual
    perfil: auditor_ambiental
    parametros:
      formato: excel
    espera:
      status: 200
      content_type: spreadsheetml

  - id: concentracion_formato_invalido
    operacion: consumir
    reporte: concentracion_anual
    perfil: auditor_ambiental
    parametros:
      formato: pdf
    espera:
      status: 400

  # ── Nuevos reportes: catálogo ──────────────────────────────────────────────

  - id: catalogo_incluye_nuevos_reportes
    operacion: catalogo
    perfil: auditor_ambiental
    espera:
      status: 200
      reportes_presentes:
        - excedencias_semana
        - peak_historico

  # ── excedencias_semana: gobernanza por planta ─────────────────────────────
  # jefe_seguridad y auditor_ambiental ven todas las plantas.
  # operador_chancado solo ve las 5 plantas del grupo Chancado.
  # tecnico_molienda solo ve las 3 plantas del grupo Molienda.

  - id: excedencias_jefe_todas_plantas
    operacion: consumir
    reporte: excedencias_semana
    perfil: jefe_seguridad
    parametros: {}
    espera:
      status: 200
      min_filas: 1
      campos_fila: [planta, punto_evaluacion, concentracion_mg_m3]

  - id: excedencias_operador_chancado
    operacion: consumir
    reporte: excedencias_semana
    perfil: operador_chancado
    parametros: {}
    espera:
      status: 200
      plantas_presentes: ["Pre-Chancado"]
      plantas_excluidas: ["Molienda SAG", "CDM"]

  - id: excedencias_tecnico_molienda
    operacion: consumir
    reporte: excedencias_semana
    perfil: tecnico_molienda
    parametros: {}
    espera:
      status: 200
      plantas_presentes: ["Molienda SAG"]
      plantas_excluidas: ["Pre-Chancado", "Nodo 3500"]

  # ── peak_historico: 1 fila por planta ────────────────────────────────────
  # jefe_seguridad: 8 plantas → 8 filas.
  # operador_chancado: 5 plantas (grupo Chancado) → 5 filas.

  - id: peak_jefe_todas
    operacion: consumir
    reporte: peak_historico
    perfil: jefe_seguridad
    parametros: {}
    espera:
      status: 200
      filas_exactas: 8
      campos_fila: [planta, punto_evaluacion, concentracion_mg_m3, nivel_semaforo]

  - id: peak_operador_chancado
    operacion: consumir
    reporte: peak_historico
    perfil: operador_chancado
    parametros: {}
    espera:
      status: 200
      filas_exactas: 5
      plantas_presentes: ["Pre-Chancado"]
      plantas_excluidas: ["Molienda SAG", "CDM"]
