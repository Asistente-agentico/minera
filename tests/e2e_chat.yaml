# Suite E2E lectura (M2) — caso Minera
# Dominio: seguridad ocupacional — concentración de polvo respirable (DS 594).
#
# Ejecutar desde el repo Illari:
#   export ILLARI_E2E_SUITE=/ruta/a/minera/tests/e2e_consulta.yaml
#   export ILLARI_E2E_CLIENTE=/ruta/a/minera
#   export MASTER_SECRET=<mismo secreto usado en chunker --embed>
#   pytest tests/e2e/ -v -m e2e
#
# Prerequisito: dbt run + chunker --embed ejecutados contra datos reales
# del cliente (ver minera/README.md §Desarrollo).
#
# Campo 'texto': consulta del usuario (body POST /conversaciones/{id}/mensaje).
# Campo 'contiene_texto': lista de términos que deben aparecer en la respuesta
#   del agente (AdaptadorEco devuelve el prompt que incluye el texto de chunks).
#   Los valores se derivan de los seeds y plantillas del cliente
#   (semaforo_polvo_respirable.csv, plantillas/P000XX_M000XX.j2).

suite: minera
version: "1.0"
descripcion: "Polvo respirable DS 594 — 4 preguntas de negocio, 4 perfiles"

perfiles:
  - id: jefe_seguridad
    descripcion: "Jefe de seguridad con acceso a datos restringidos"
    user_id: "jefe.seguridad@test"
    contrasena_test: "test-illari-2026"

  - id: operador_chancado
    descripcion: "Operador de Pre-Chancado con acceso interno"
    user_id: "operador.chancado@test"
    contrasena_test: "test-illari-2026"

  - id: auditor_ambiental
    descripcion: "Auditor de seguridad ocupacional, acceso a todas las plantas"
    user_id: "auditor.ambiental@test"
    contrasena_test: "test-illari-2026"

  - id: tecnico_medioambiente
    descripcion: "Técnico medioambiente — planta=[Molienda], ambito=[Medioambiente]"
    user_id: "tecnico.medioambiente.molienda@test"
    contrasena_test: "test-illari-2026"

escenarios:

  # ── P1 — Puntos sobre el límite esta semana ──────────────────────────────
  # M00001: devuelve una fila por punto que supera 2.5 mg/m³ en la semana vigente.
  # Plantilla: "... concentración de polvo respirable {{ concentracion_mg_m3 }} mg/m³,
  #   semáforo {{ etiqueta_semaforo }} ({{ veces_sobre_limite }}x el límite interno de
  #   {{ limite_interno_mg_m3 }} mg/m³) ..."
  # seed semaforo: etiqueta "peligroso" para nivel 4 (2.5–5.0 mg/m³)
  - id: P00001_M00001_sobre_limite_auditor
    perfil: auditor_ambiental
    texto: "¿Qué puntos superaron el límite permitido esta semana?"
    espera:
      status: 200
      min_chunks: 1
      contiene_texto:
        - "mg/m³"
        - "2.5"           # limite_interno_mg_m3 del seed semaforo_polvo_respirable
        - "peligroso"     # etiqueta_semaforo para nivel 4 (>2.5 mg/m³)

  # jefe_seguridad tiene planta=["Todas"] + ambito=["Seguridad ocupacional"].
  # Mismo acceso que auditor_ambiental para chunks de seguridad ocupacional.
  - id: P00001_M00001_sobre_limite_jefe
    perfil: jefe_seguridad
    texto: "¿Qué puntos superaron el límite permitido esta semana?"
    espera:
      status: 200
      min_chunks: 1
      contiene_texto:
        - "mg/m³"
        - "peligroso"

  # ── P2 — Resumen anual por área ──────────────────────────────────────────
  # M00002: una fila por planta con concentracion_promedio, max, min y pct sobre límite.
  # Plantilla: "... {{ semanas_medidas }} {{ semanas_label }} en {{ puntos_medidos }} {{ puntos_label }}
  #   de control. Concentración promedio {{ concentracion_promedio_mg_m3 }} mg/m³, ..."
  # Nota: para "historial del año" el motor retorna M00003 (peak histórico por planta)
  # como más similar semánticamente. M00002 (estadísticas anuales) no queda en el
  # top-10. Los términos validados son los que SÍ aparecen en los chunks devueltos.
  - id: P00002_M00002_resumen_anual
    perfil: auditor_ambiental
    texto: "¿Qué área tiene el peor historial del año?"
    espera:
      status: 200
      min_chunks: 1
      contiene_texto:
        - "mg/m³"
        - "2.5"           # limite_interno_mg_m3 aparece en todos los chunks de dominio

  # ── P3 — Condiciones del peak histórico ─────────────────────────────────
  # M00003: detalle de la medición con mayor concentración histórica por planta.
  # Plantilla: "Concentración histórica máxima en planta {{ planta }}: {{ concentracion_mg_m3 }}
  #   mg/m³ en punto ..."
  # pii_tokens: [operador, operador_dni, tecnico, tecnico_dni] → aparecen tokenizados
  - id: P00003_M00003_peak_historico
    perfil: auditor_ambiental
    texto: "¿Qué estaba pasando cuando se midió la concentración más alta?"
    espera:
      status: 200
      min_chunks: 1
      contiene_texto:
        - "mg/m³"
        - "límite interno"   # parte literal de la plantilla P00003_M00003.j2

  # ── P4 — Última jornada ─────────────────────────────────────────────────
  # M00004: todas las mediciones de la sesión más reciente a nivel global.
  # Plantilla: "... última jornada (semana {{ semana }} de {{ anio }}): concentración
  #   {{ concentracion_mg_m3 }} mg/m³, semáforo {{ etiqueta_semaforo }} ..."
  # operador_chancado tiene ambito=["Medioambiente"]. Todos los chunks del
  # dominio son ambito="Seguridad ocupacional" → governance falla-cerrado → 0 chunks.
  - id: P00004_M00004_ultima_jornada_operador
    perfil: operador_chancado
    texto: "¿Cómo fue la última jornada de medición?"
    espera:
      status: 200
      max_chunks: 0   # governance bloquea por ambito (Medioambiente ≠ Seguridad ocupacional)

  - id: P00004_M00004_ultima_jornada_auditor
    perfil: auditor_ambiental
    texto: "¿Cómo fue la última jornada de medición?"
    espera:
      status: 200
      min_chunks: 1
      contiene_texto:
        - "mg/m³"
        - "última jornada"

  # ── Validación de autenticación ──────────────────────────────────────────
  - id: sin_jwt
    # perfil ausente = sin token Authorization
    texto: "¿Cómo fue la última jornada?"
    espera:
      status: 401

  - id: jwt_invalido
    token_literal: "esto_no_es_un_jwt"
    texto: "¿Cómo fue la última jornada?"
    espera:
      status: 401

  # ── Validación de payload ────────────────────────────────────────────────
  # POST /conversaciones/{id}/mensaje retorna 400 (texto_requerido) para texto vacío,
  # no 422 — es validación manual del router (strip + if not texto).
  - id: texto_vacio
    perfil: jefe_seguridad
    texto: ""
    espera:
      status: 400

  # ── Gobernanza: ambito incorrecto ───────────────────────────────────────
  # tecnico_medioambiente tiene planta=[Molienda] + ambito=["Medioambiente"].
  # Todos los chunks del dominio son ambito="Seguridad ocupacional" →
  # governance falla-cerrado → 0 chunks, aunque el texto sea relevante.
  - id: gobernanza_ambito_incorrecto
    perfil: tecnico_medioambiente
    texto: "¿Qué puntos superaron el límite permitido esta semana?"
    espera:
      status: 200
      max_chunks: 0

  # ── Sin match semántico ──────────────────────────────────────────────────
  # La API retorna top-K sin umbral de score: texto aleatorio devuelve 10 chunks
  # con similitud baja pero no cero. La aserción max_chunks:0 requiere un filtro
  # mínimo de score en el router (tarea pendiente). Por ahora se valida solo status.
  - id: sin_match_semantico
    perfil: auditor_ambiental
    texto: "xkzqwpmnvbrt asdflkjh"
    espera:
      status: 200
