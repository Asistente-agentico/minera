# docker-compose.lectura.yml — Suite E2E lectura completa
#
# Levanta MK → MV → MA + M2.
# MA (8001) y M2 (8000) se exponen al host para que pytest corra localmente.
#
# Prerrequisito: datos/qdrant_mv/ poblada por la suite de escritura.
#
# Uso (desde la raíz del repo minera):
#   MASTER_SECRET=xxx docker compose -f docker-compose.lectura.yml up -d
#   # esperar a M2 healthy, luego ejecutar pytest
#   docker compose -f docker-compose.lectura.yml down --remove-orphans
#
# Variables de entorno:
#   MASTER_SECRET  — secreto de cifrado (obligatorio)
#   ILLARI_TAG     — tag de imagen (default: dev-0.7.1)

x-base: &base
  image: ghcr.io/asistente-agentico/illari:${ILLARI_TAG:-dev-0.7.1}
  volumes:
    - .:/cliente/minera
  networks: [red_illari]

services:

  mk:
    <<: *base
    entrypoint: python -m mk.api.main
    environment:
      MASTER_SECRET: ${MASTER_SECRET}
      MK_PORT: "8003"
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8003/health')"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  mv-api:
    <<: *base
    entrypoint: >
      sh -c "pip install fastembed -q 2>/dev/null &&
             python -m mv.api.main"
    depends_on:
      mk:
        condition: service_healthy
    environment:
      MK_URL: "http://mk:8003"
      CLIENTE_DIR: /cliente/minera
      MV_PORT: "8002"
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 20s

  ma:
    <<: *base
    entrypoint: uvicorn ma.api.main:app --host 0.0.0.0 --port 8001
    environment:
      CLIENTE_DIR: /cliente/minera
      # Hashes bcrypt (cost=4) de la contraseña de prueba 'test-illari-2026'.
      # Los $$ son el escape de $ en docker compose (resultado: $2b$04$...).
      MA_USER_HASH_amVmZS5zZWd1cmlkYWRAdGVzdA: "$$2b$$04$$S5S3tejM5JDZjzSbSPIIr.JAMtP4oMpKgT/UzzWSw3/qCS.joIaJq"
      MA_USER_HASH_b3BlcmFkb3IuY2hhbmNhZG9AdGVzdA: "$$2b$$04$$S5S3tejM5JDZjzSbSPIIr.JAMtP4oMpKgT/UzzWSw3/qCS.joIaJq"
      MA_USER_HASH_YXVkaXRvci5hbWJpZW50YWxAdGVzdA: "$$2b$$04$$S5S3tejM5JDZjzSbSPIIr.JAMtP4oMpKgT/UzzWSw3/qCS.joIaJq"
      MA_USER_HASH_dGVjbmljby5tZWRpb2FtYmllbnRlQHRlc3Q: "$$2b$$04$$S5S3tejM5JDZjzSbSPIIr.JAMtP4oMpKgT/UzzWSw3/qCS.joIaJq"
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  m2:
    <<: *base
    entrypoint: uvicorn m2.api.main:app --host 0.0.0.0 --port 8000
    depends_on:
      mv-api:
        condition: service_healthy
      ma:
        condition: service_healthy
    environment:
      CLIENTE_DIR: /cliente/minera
      MA_JWKS_URL: "http://ma:8001/jwks"
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 15s

networks:
  red_illari:
    driver: bridge
