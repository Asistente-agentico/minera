# landing.yaml — Caso Minera (prueba)
#
# Fuente: planilla Excel "Puntos Criticos Semana 19- 2026.xlsx", exportada
# a CSV por hoja. Estructura irregular: fila 1 = título, fila 2 = números
# de semana como encabezados (1..52 + repetición año siguiente), filas
# siguientes mezclan metadatos (fecha, operador, técnico, horario) con
# valores de concentración por punto de medición.
#
# El modelo dbt bronce de cada fuente maneja el parseo de esta estructura.
# schema_columnas declara solo la columna de etiqueta (primera columna);
# las columnas de semana (72 en total) se procesan via SELECT * en bronce.
#
# Patrón de ingesta: overwrite + snapshot (Camino A).
# DEUDA: no escala con el tiempo — ver analisis/preguntas.md.
#
# Ruta de datos en el contenedor: montar ./datos en /datos al correr docker.
#   docker run -v ./datos:/datos -v ./configuracion:/app/configuracion ...

version: "1.2"
metadata:
  cliente_id: minera_prueba
  descripcion: Mediciones de concentración de polvo respirable por área de planta

landing:
  - nombre: mediciones_prechancado
    lakehouse: duckdb
    descripcion: Mediciones semanales de polvo respirable — área Pre-Chancado
    formato: csv
    ubicacion: /datos/csv/Prechancado.csv
    schema_columnas:
      - {nombre: etiqueta, tipo: string, nullable: true}
    frecuencia: {tipo: batch, cron: "0 8 * * 1"}
    ingestion_pattern: overwrite
    frecuencia_actualizacion: semanal
    enable_snapshots: true
    snapshot_strategy: check_cols
    snapshot_check_cols: [etiqueta]

