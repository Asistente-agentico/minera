# docker-compose.ingesta.yml — Suite E2E ingesta completa
#
# Levanta MK -> MV (BDV embebida) y corre M1 como job único.
# Los chunks quedan indexados en datos/qdrant_mv/ (Qdrant embebido de MV).
#
# Uso (desde la raíz del repo minera):
#   MASTER_SECRET=xxx docker compose -f docker-compose.ingesta.yml up \
#       --abort-on-container-exit --exit-code-from m1
#
# Variables de entorno:
#   MASTER_SECRET     — secreto de cifrado (obligatorio)
#   ILLARI_MK_IMAGE   — override imagen mk  (default: illari-mk:local)
#   ILLARI_MV_IMAGE   — override imagen mv  (default: illari-mv:local)
#   ILLARI_M1_IMAGE   — override imagen m1  (default: illari-m1:local)

x-base: &base
  volumes:
    - .:/cliente/minera
  networks: [red_illari]

services:

  mk:
    <<: *base
    image: ${ILLARI_MK_IMAGE:-illari-mk:local}
    entrypoint: python -m mk.api.main
    environment:
      MASTER_SECRET: ${MASTER_SECRET}
      MK_PORT: "8003"
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8003/health')"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  qdrant-init:
    image: alpine
    command: sh -c "chmod 777 /qdrant"
    volumes:
      - qdrant_mv:/qdrant
    networks: [red_illari]

  mv:
    <<: *base
    image: ${ILLARI_MV_IMAGE:-illari-mv:local}
    entrypoint: uvicorn mv.api.main:app --host 0.0.0.0 --port 8002
    stop_grace_period: 8s
    volumes:
      - .:/cliente/minera
      # RW para que fastembed pueda descargar el modelo la primera vez.
      # Siguientes corridas reusan el cache del host sin descargar.
      - ./datos/fastembed_cache:/home/asistente/.cache
      - qdrant_mv:/cliente/minera/datos/qdrant_mv
    depends_on:
      mk:
        condition: service_healthy
      qdrant-init:
        condition: service_completed_successfully
    environment:
      MK_URL: "http://mk:8003"
      CLIENTE_DIR: /cliente/minera
      MV_PORT: "8002"
      FASTEMBED_CACHE_PATH: /home/asistente/.cache
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 20s

  m1:
    <<: *base
    image: ${ILLARI_M1_IMAGE:-illari-m1:local}
    entrypoint:
      - sh
      - -c
      - >-
        python3 /cliente/minera/scripts/cargar_landing.py
        --raiz /cliente/minera &&
        dbt seed
        --project-dir /cliente/minera/modelos
        --profiles-dir /cliente/minera/modelos &&
        dbt snapshot
        --project-dir /cliente/minera/modelos
        --profiles-dir /cliente/minera/modelos &&
        dbt run
        --project-dir /cliente/minera/modelos
        --profiles-dir /cliente/minera/modelos &&
        python -m m1.core.orquestador.cli ejecutar
        --dev
        --config /cliente/minera/configuracion
        --schemas /app/configuracion/schemas
        --medallon /cliente/minera/modelos
        --profiles-dir /cliente/minera/modelos
        --raiz /cliente/minera
    depends_on:
      mv:
        condition: service_healthy
    environment:
      MINERA_DB_PATH: /cliente/minera/datos/minera.duckdb
      MV_URL: "http://mv:8002"
      CLIENTE_DIR: /cliente/minera
    restart: "no"

networks:
  red_illari:
    driver: bridge

volumes:
  qdrant_mv:
