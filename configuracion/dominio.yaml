# dominio.yaml — Caso Minera (prueba)
#
# Quién: cliente, asistentes y tenants del deployment.
# La config técnica del pipeline vive en app.yaml.
# Las dimensiones de gobernanza viven en permisos.yaml.

cliente:
  cliente_id: minera_prueba
  nombre_ui: Minera de Chile
  descripcion: Minera ubicada en el norte de Chile

asistentes:
  - asistente_id: minera_SOyM
    version: "0.8.0"
    nombre_ui: "Asistente de Seguridad Ocupacional y Medioambiente"
    nombre_corto_ui: "SOyM"
    subtitulo: "Mediciones de polvo ambiental"
    descripcion: "Mediciones ambientales de polvo respirable en puntos críticos por planta de la minera."

asistente_activo_inicial: minera_SOyM

zona_horaria: "America/Santiago"
idioma: "es_CL"

tenants:
  - id: minera_prueba
    nombre: Minera de Chile
    dominio: null
    region: null
    branding:
      archivo: configuracion/ui/branding.json
