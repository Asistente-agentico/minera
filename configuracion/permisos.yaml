# permisos.yaml — Usuarios de test para suite E2E de minera.
#
# Las contraseñas NO están aquí (Ley 21.719). Se almacenan como bcrypt
# hashes en env vars MA_USER_HASH_<base64url(user_id)> al ejecutar tests.
# En producción, este archivo contiene los usuarios reales del cliente.

separador_contexto_pares: "_._"
separador_contexto_dim_valor: ":::"

dimensiones:
  planta:
    tipo: enum
    nombre_ui: "Planta"
    # valores = strings canónicos de bronce_mediciones.sql; sin nombres_ui_valores
    # porque los valores ya son los strings de display (match exacto con chunks).
    valores:
      - "Pre-Chancado"
      - "Nodo 3500"
      - "Chancado 2° y 3°"
      - "Chancado Fino 3°"
      - "Chancado Fino 4°"
      - "Molienda SAG"
      - "Molienda Convencional"
      - "CDM"

    grupos:
      chancado:
        - "Pre-Chancado"
        - "Nodo 3500"
        - "Chancado 2° y 3°"
        - "Chancado Fino 3°"
        - "Chancado Fino 4°"
      molienda:
        - "Molienda SAG"
        - "Molienda Convencional"
        - "CDM"
      todas:
        - "Pre-Chancado"
        - "Nodo 3500"
        - "Chancado 2° y 3°"
        - "Chancado Fino 3°"
        - "Chancado Fino 4°"
        - "Molienda SAG"
        - "Molienda Convencional"
        - "CDM"
  
  ambito:
    tipo: enum
    nombre_ui: "Ámbito"
    valores:
      - seguridad_ocupacional
      - medioambiente
    nombres_ui_valores:
      seguridad_ocupacional: "Seguridad ocupacional"
      medioambiente: "Medioambiente"
    grupos:
      todos:
        - seguridad_ocupacional
        - medioambiente

  clasificacion:
    tipo: ordinal
    nombre_ui: "Clasificación"
    valores:
      - publico
      - interno
      - restringido
      - solo_gerencias
    nombres_ui_valores:
      publico: "Público"
      interno: "Interno"
      restringido: "Restringido"
      solo_gerencias: "Solo gerencias"

arboles_contextos:
  - id: AC0001
    nombre_ui: "Árbol principal"
    niveles:
      - dimension: ambito
      - dimension: planta

usuarios:
  - user_id: "jefe.seguridad@test"
    nombre_ui: "Jefe de Seguridad"
    tipo: cliente
    arbol_id: AC0001
    permisos:
      chat: [consumir]
      reportes: [consumir]
    gobernanza:
      dimensiones:
        planta: ["todas"]
        ambito: ["seguridad_ocupacional"]
        clasificacion: "restringido"

  - user_id: "operador.chancado@test"
    nombre_ui: "Operador Chancado"
    tipo: cliente
    arbol_id: AC0001
    permisos:
      chat: [consumir]
      reportes: [consumir]
    gobernanza:
      dimensiones:
        planta: [chancado]
        ambito: [medioambiente]
        clasificacion: "interno"

  - user_id: "auditor.ambiental@test"
    nombre_ui: "Auditor Ambiental"
    tipo: cliente
    arbol_id: AC0001
    permisos:
      chat: [consumir]
      reportes: [consumir]
    gobernanza:
      dimensiones:
        planta: [todas]
        ambito: [todos]
        clasificacion: "restringido"

  - user_id: "tecnico.medioambiente.molienda@test"
    nombre_ui: "Técnico Medioambiente Molienda"
    tipo: cliente
    arbol_id: AC0001
    permisos:
      chat: [consumir]
      reportes: [consumir]
    gobernanza:
      dimensiones:
        planta: [molienda]
        ambito: [medioambiente]
        clasificacion: "interno"
