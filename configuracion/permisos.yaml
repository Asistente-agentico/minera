# permisos.yaml — Usuarios de test para suite E2E de minera.
#
# Las contraseñas NO están aquí (Ley 21.719). Se almacenan como bcrypt
# hashes en env vars MA_USER_HASH_<base64url(user_id)> al ejecutar tests.
# En producción, este archivo contiene los usuarios reales del cliente.

separador_contexto_pares: "_._"
separador_contexto_dim_valor: ":::"

dimensiones:
  planta:
    tipo: enum
    nombre_ui: "Planta"
    # Convención: nombres_ui_valores SOLO para aliases de grupo (sin contraparte
    # en BD). Los valores concretos deben aparecer tal cual están en la BD
    # fuente (bronce_mediciones.sql) para match exacto contra chunks de Qdrant.
    valores:
      - "Pre-Chancado"
      - "Nodo 3500"
      - "Chancado 2° y 3°"
      - "Chancado Fino 3°"
      - "Chancado Fino 4°"
      - "Molienda SAG"
      - "Molienda Convencional"
      - "CDM"

    nombres_ui_valores:
      chancado: "Chancado"
      molienda: "Molienda"
      todas: "Todas"

    grupos:
      chancado:
        - "Pre-Chancado"
        - "Nodo 3500"
        - "Chancado 2° y 3°"
        - "Chancado Fino 3°"
        - "Chancado Fino 4°"
      molienda:
        - "Molienda SAG"
        - "Molienda Convencional"
        - "CDM"
      todas:
        - "Pre-Chancado"
        - "Nodo 3500"
        - "Chancado 2° y 3°"
        - "Chancado Fino 3°"
        - "Chancado Fino 4°"
        - "Molienda SAG"
        - "Molienda Convencional"
        - "CDM"

  ambito:
    tipo: enum
    nombre_ui: "Ámbito"
    # Convención: nombres_ui_valores SOLO para grupos. Los valores concretos
    # (seguridad_ocupacional, medioambiente) aparecen tal cual en BD.
    valores:
      - seguridad_ocupacional
      - medioambiente
    nombres_ui_valores:
      todos: "Todos"
    grupos:
      todos:
        - seguridad_ocupacional
        - medioambiente

  clasificacion:
    tipo: ordinal
    nombre_ui: "Clasificación"
    # Sin grupos → sin nombres_ui_valores. Los valores ordinales aparecen
    # tal cual están definidos.
    valores:
      - publico
      - interno
      - restringido
      - solo_gerencias

arboles_contextos:
  - id: AC0001
    nombre_ui: "Árbol principal"
    niveles:
      - dimension: ambito
      - dimension: planta

usuarios:
  - user_id: "jefe.seguridad@test"
    nombre_ui: "Jefe de Seguridad"
    tipo: cliente
    arbol_id: AC0001
    permisos:
      chat: [consumir]
      reportes: [consumir]
    gobernanza:
      dimensiones:
        planta: ["todas"]
        ambito: ["seguridad_ocupacional"]
        clasificacion: "restringido"

  - user_id: "operador.chancado@test"
    nombre_ui: "Operador Chancado"
    tipo: cliente
    arbol_id: AC0001
    permisos:
      chat: [consumir]
      reportes: [consumir]
    gobernanza:
      dimensiones:
        planta: [chancado]
        ambito: [medioambiente]
        clasificacion: "interno"

  - user_id: "auditor.ambiental@test"
    nombre_ui: "Auditor Ambiental"
    tipo: cliente
    arbol_id: AC0001
    permisos:
      chat: [consumir]
      reportes: [consumir]
    gobernanza:
      dimensiones:
        planta: [todas]
        ambito: [todos]
        clasificacion: "restringido"

  - user_id: "tecnico.medioambiente.molienda@test"
    nombre_ui: "Técnico Medioambiente Molienda"
    tipo: cliente
    arbol_id: AC0001
    permisos:
      chat: [consumir]
      reportes: [consumir]
    gobernanza:
      dimensiones:
        planta: [molienda]
        ambito: [medioambiente]
        clasificacion: "interno"
