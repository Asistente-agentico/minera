# permisos.yaml — Usuarios de test para suite E2E de minera.
#
# Las contraseñas NO están aquí (Ley 21.719). Se almacenan como bcrypt
# hashes en env vars MA_USER_HASH_<base64url(user_id)> al ejecutar tests.
# En producción, este archivo contiene los usuarios reales del cliente.

dimensiones:
  planta:
    tipo: enum
    nombre_ui: "Planta"
    valores:
      - Pre-Chancado
      - Chancado 2° y 3°
      - Chancado Fino 3°
      - Chancado Fino 4°
      - Molienda SAG
      - Molienda Convencional
      - CDM
      - Nodo 3500
    grupos:
      chancado:
        - Nodo 3500
        - Pre-Chancado
        - "Chancado 2° y 3°"
        - "Chancado Fino 3°"
        - "Chancado Fino 4°"
      molienda:
        - Molienda SAG
        - Molienda Convencional
        - CDM
      todas:
        - Pre-Chancado
        - Chancado 2° y 3°
        - Chancado Fino 3°
        - Chancado Fino 4°
        - Molienda SAG
        - Molienda Convencional
        - CDM
        - Nodo 3500

  ambito:
    tipo: enum
    nombre_ui: "Ámbito"
    valores:
      - seguridad_ocupacional
      - medioambiente
    grupos:
      todos:
        - seguridad_ocupacional
        - medioambiente

  clasificacion:
    tipo: ordinal
    nombre_ui: "Clasificación"
    valores:
      - publico
      - interno
      - restringido
      - solo_gerencias

arboles_contextos:
  - id: AC0001
    nombre: "Árbol principal"
    niveles:
      - dimension: ambito
      - dimension: planta

usuarios:
  - user_id: "jefe.seguridad@test"
    tipo: cliente
    arbol_id: AC0001
    permisos:
      chat: [consumir]
      reportes: [consumir]
    gobernanza:
      dimensiones:
        planta: ["todas"]
        ambito: ["seguridad_ocupacional"]
        clasificacion: "restringido"

  - user_id: "operador.chancado@test"
    tipo: cliente
    arbol_id: AC0001
    permisos:
      chat: [consumir]
      reportes: [consumir]
    gobernanza:
      dimensiones:
        planta: [chancado]
        ambito: [medioambiente]
        clasificacion: "interno"

  - user_id: "auditor.ambiental@test"
    tipo: cliente
    arbol_id: AC0001
    permisos:
      chat: [consumir]
      reportes: [consumir]
    gobernanza:
      dimensiones:
        planta: [todas]
        ambito: [todos]
        clasificacion: "restringido"

  - user_id: "tecnico.medioambiente.molienda@test"
    tipo: cliente
    arbol_id: AC0001
    permisos:
      chat: [consumir]
      reportes: [consumir]
    gobernanza:
      dimensiones:
        planta: [molienda]
        ambito: ["medioambiente"]
        clasificacion: "interno"
