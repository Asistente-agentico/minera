# permisos.yaml — Usuarios de test para suite E2E de minera.
#
# Las contraseñas NO están aquí (Ley 21.719). Se almacenan como bcrypt
# hashes en env vars MA_USER_HASH_<base64url(user_id)> al ejecutar tests.
# En producción, este archivo contiene los usuarios reales del cliente.
#
# Dimensiones validadas contra configuracion/dominio.yaml.

usuarios:
  - user_id: "jefe.seguridad@test"
    tipo: cliente
    roles:
      reportes: [consumer]
    gobernanza:
      dimensiones:
        planta: ["Molienda SAG"]
        ambito: ["seguridad_ocupacional"]
        clasificacion: "restringido"

  - user_id: "operador.chancado@test"
    tipo: cliente
    roles:
      reportes: [consumer]
    gobernanza:
      dimensiones:
        planta: ["Pre-Chancado"]
        ambito: ["seguridad_ocupacional"]
        clasificacion: "interno"

  - user_id: "auditor.ambiental@test"
    tipo: cliente
    roles:
      reportes: [consumer]
    gobernanza:
      dimensiones:
        planta:
          - "Pre-Chancado"
          - "Chancado 2° y 3°"
          - "Chancado Fino 3°"
          - "Chancado Fino 4°"
          - "Molienda SAG"
          - "Molienda Convencional"
          - "CDM"
          - "Nodo 3500"
        ambito: ["seguridad_ocupacional"]
        clasificacion: "restringido"

  - user_id: "tecnico.medioambiente@test"
    tipo: cliente
    roles:
      reportes: [consumer]
    gobernanza:
      dimensiones:
        planta:
          - "Pre-Chancado"
          - "Chancado 2° y 3°"
          - "Chancado Fino 3°"
          - "Chancado Fino 4°"
          - "Molienda SAG"
          - "Molienda Convencional"
          - "CDM"
          - "Nodo 3500"
        ambito: ["medioambiente"]
        clasificacion: "interno"
