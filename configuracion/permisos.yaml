# permisos.yaml — Usuarios de test para suite E2E de minera.
#
# Las contraseñas NO están aquí (Ley 21.719). Se almacenan como bcrypt
# hashes en env vars MA_USER_HASH_<base64url(user_id)> al ejecutar tests.
# En producción, este archivo contiene los usuarios reales del cliente.

separador_contexto_pares: "_._"
separador_contexto_dim_valor: ":::"

dimensiones:
  planta:
    tipo: enum
    nombre_ui: "Planta"
    # Convención: la clave de cada entrada en `grupos` es directamente el
    # string que muestra la UI (sin separadores). Los valores concretos
    # aparecen tal cual están en la BD fuente (bronce_mediciones.sql) para
    # match exacto contra chunks de Qdrant.
    valores:
      - "Pre-Chancado"
      - "Nodo 3500"
      - "Chancado 2° y 3°"
      - "Chancado Fino 3°"
      - "Chancado Fino 4°"
      - "Molienda SAG"
      - "Molienda Convencional"
      - "CDM"

    grupos:
      Chancado:
        - "Pre-Chancado"
        - "Nodo 3500"
        - "Chancado 2° y 3°"
        - "Chancado Fino 3°"
        - "Chancado Fino 4°"
      Molienda:
        - "Molienda SAG"
        - "Molienda Convencional"
        - "CDM"
      Todas:
        - "Pre-Chancado"
        - "Nodo 3500"
        - "Chancado 2° y 3°"
        - "Chancado Fino 3°"
        - "Chancado Fino 4°"
        - "Molienda SAG"
        - "Molienda Convencional"
        - "CDM"

  ambito:
    tipo: enum
    nombre_ui: "Ámbito"
    # Los valores concretos ("Seguridad ocupacional", "Medioambiente")
    # aparecen tal cual están en BD. La clave del grupo es el display.
    valores:
      - "Seguridad ocupacional"
      - "Medioambiente"
    grupos:
      Todos:
        - "Seguridad ocupacional"
        - "Medioambiente"

  clasificacion:
    tipo: ordinal
    nombre_ui: "Clasificación"
    # Sin grupos. Los valores ordinales aparecen tal cual están definidos.
    valores:
      - "Público"
      - "Interno"
      - "Restringido"
      - "Solo gerencias"

arboles_contextos:
  - id: AC0001
    nombre_ui: "Árbol principal"
    niveles:
      - dimension: ambito
      - dimension: planta

usuarios:
  - user_id: "jefe.seguridad@test"
    nombre_ui: "Jefe de Seguridad"
    tipo: cliente
    arbol_id: AC0001
    permisos:
      chat: [consumir]
      reportes: [consumir]
    gobernanza:
      dimensiones:
        planta: ["Todas"]
        ambito: ["Seguridad ocupacional"]
        clasificacion: "Restringido"

  - user_id: "operador.chancado@test"
    nombre_ui: "Operador Chancado"
    tipo: cliente
    arbol_id: AC0001
    permisos:
      chat: [consumir]
      reportes: [consumir]
    gobernanza:
      dimensiones:
        planta: ["Chancado"]
        ambito: ["Medioambiente"]
        clasificacion: "Interno"

  - user_id: "auditor.ambiental@test"
    nombre_ui: "Auditor Ambiental"
    tipo: cliente
    arbol_id: AC0001
    permisos:
      chat: [consumir]
      reportes: [consumir]
    gobernanza:
      dimensiones:
        planta: ["Todas"]
        ambito: ["Todos"]
        clasificacion: "Restringido"

  - user_id: "tecnico.medioambiente.molienda@test"
    nombre_ui: "Técnico Medioambiente Molienda"
    tipo: cliente
    arbol_id: AC0001
    permisos:
      chat: [consumir]
      reportes: [consumir]
    gobernanza:
      dimensiones:
        planta: ["Molienda"]
        ambito: ["Medioambiente"]
        clasificacion: "Interno"
