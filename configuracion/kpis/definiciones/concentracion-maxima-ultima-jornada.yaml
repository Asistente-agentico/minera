kpi:
  kpi_id: concentracion-maxima-ultima-jornada
  titulo: "Concentración máxima de polvo (última jornada)"
  descripcion: |
    Mayor concentración de polvo respirable medida por punto de evaluación
    en la última jornada de medición.
  unidad: "mg/m³"
  bandas_severidad_id: "01KSXY0NV1QJ4J7E61X4WJ8NPY"
  etiqueta_grupos:
    meta:   [bajo, controlado]
    riesgo: [alerta]
    fuera:  [peligroso, critico]
  reporte_id: concentracion-maxima-detalle
  # umbral y severidad deprecated — el mart materializa nivel/etiqueta/color (ADR-019)
  umbral: 3.0
  severidad:
    - rango: [null, 1.99]
      nivel: ok
    - rango: [2.0, 2.99]
      nivel: warning
    - rango: [3.0, null]
      nivel: critico
  columnas:
    - {campo: planta,               etiqueta: "Planta",              orden: 1, formato: texto}
    - {campo: punto_evaluacion,     etiqueta: "Punto de evaluación", orden: 2, formato: texto}
    - {campo: valor_actual,         etiqueta: "Concentración",       orden: 3, formato: numero, unidad: "mg/m³"}
    - {campo: estado_limite,        etiqueta: "Estado vs límite",    orden: 4, formato: texto}
    - {campo: limite_interno_mg_m3, etiqueta: "Límite",              orden: 5, formato: numero, unidad: "mg/m³"}
    - {campo: anio,                 etiqueta: "Año",                 orden: 6, formato: entero}
    - {campo: semana,               etiqueta: "Semana",              orden: 7, formato: entero}
    - {campo: etiqueta,             etiqueta: "Severidad",           orden: 8, formato: texto, visible: false}
    - {campo: color,                etiqueta: "Color",               orden: 9, formato: texto, visible: false}
    - {campo: version_umbral,       etiqueta: "Versión umbral",      orden: 10, formato: entero, visible: false}
  gobernanza:
    modelo_oro: M00004
    dimensiones_requeridas: [planta]
