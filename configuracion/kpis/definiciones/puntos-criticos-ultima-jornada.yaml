kpi:
  kpi_id: puntos-criticos-ultima-jornada
  titulo: "Puntos sobre el límite (última jornada)"
  descripcion: |
    Cantidad de puntos de evaluación que superaron el límite en la última
    jornada de medición.
  unidad: "puntos"
  umbral: 0
  severidad:
    - rango: [null, 0]
      nivel: ok
    - rango: [1, 2]
      nivel: warning
    - rango: [3, null]
      nivel: critico
  columnas:
    - {campo: planta,         etiqueta: "Planta",             orden: 1, formato: texto}
    - {campo: valor_actual,   etiqueta: "Puntos sobre límite", orden: 2, formato: entero}
    - {campo: puntos_totales, etiqueta: "Puntos evaluados",   orden: 3, formato: entero}
  gobernanza:
    modelo_oro: M00004
    dimensiones_requeridas: [planta]
