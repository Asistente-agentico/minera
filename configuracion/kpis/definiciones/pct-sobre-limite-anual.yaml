kpi:
  kpi_id: pct-sobre-limite-anual
  titulo: "% de mediciones sobre el límite (anual)"
  descripcion: |
    Porcentaje de mediciones del año que superan el límite permitido (DS 594),
    por planta.
  unidad: "%"
  umbral: 5.0
  severidad:
    - rango: [null, 4.9]
      nivel: ok
    - rango: [5.0, 14.9]
      nivel: warning
    - rango: [15.0, null]
      nivel: critico
  columnas:
    - {campo: planta,                 etiqueta: "Planta",                orden: 1, formato: texto}
    - {campo: anio,                   etiqueta: "Año",                   orden: 2, formato: entero}
    - {campo: valor_actual,           etiqueta: "% sobre límite",        orden: 3, formato: porcentaje, unidad: "%"}
    - {campo: registros_sobre_limite, etiqueta: "Mediciones sobre límite", orden: 4, formato: entero}
    - {campo: total_registros,        etiqueta: "Mediciones totales",    orden: 5, formato: entero}
    - {campo: limite_interno_mg_m3,   etiqueta: "Límite",                orden: 6, formato: numero, unidad: "mg/m³"}
  gobernanza:
    modelo_oro: M00002
    dimensiones_requeridas: [planta]
