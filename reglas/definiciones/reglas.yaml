# reglas/polvo_respirable.yaml — Caso Minera (prueba)

version: "1.0"
metadata:
  cliente_id: minera_prueba

reglas:

  # P00001 — Puntos que superaron el límite interno en la semana vigente.
  - regla: P00001_M00001
    identidad:
      estado: vigente
      descripcion: "Puntos de medición que superaron el límite interno (2,5 mg/m³) en la semana vigente, con semáforo de concentración."

    chunk_id:
      columns: [planta, punto_evaluacion, semana]
      separator: "_"

    privacidad:
      pii_estrategia: tokens
      pii_tokens: [operador, tecnico]
      estrategia_olvido: etiqueta

    gobernanza:
      dimensiones:
        planta: column:planta
        ambito: seguridad_ocupacional
        clasificacion: restringido
      dimensiones_en_texto: []

    vigencia:
      politica_vigencia: preservar
      hereda_chunks_de: []

    criterios_calidad:
      threshold: 0.80
      recall_min: 0.70
      expected_count_min: 1
      expected_count_max: 50

  # P00002 — Resumen anual de concentración por planta.
  - regla: P00002_M00002
    identidad:
      estado: vigente
      descripcion: "Resumen anual de polvo respirable por planta: concentración promedio, máxima y mínima, y registros que superaron el límite interno."

    chunk_id:
      columns: [planta, anio]
      separator: "_"

    privacidad:
      pii_estrategia: tokens
      pii_tokens: []
      estrategia_olvido: borrar_chunk

    gobernanza:
      dimensiones:
        planta: column:planta
        ambito: seguridad_ocupacional
        clasificacion: interno
      dimensiones_en_texto: []

    vigencia:
      politica_vigencia: preservar
      hereda_chunks_de: []

    criterios_calidad:
      threshold: 0.80
      recall_min: 0.70
      expected_count_min: 1
      expected_count_max: 20

  # P00003 — Detalle de la medición con mayor concentración histórica por área.
  - regla: P00003_M00003
    identidad:
      estado: vigente
      descripcion: "Detalle completo (fecha, operador, técnico, horario) de la medición con mayor concentración histórica por área."

    chunk_id:
      columns: [planta]
      separator: "_"

    privacidad:
      pii_estrategia: tokens
      pii_tokens: [operador, operador_dni, tecnico, tecnico_dni]
      estrategia_olvido: borrar_chunk

    gobernanza:
      dimensiones:
        planta: column:planta
        ambito: seguridad_ocupacional
        clasificacion: restringido
      dimensiones_en_texto: []

    vigencia:
      politica_vigencia: preservar
      hereda_chunks_de: []

    criterios_calidad:
      threshold: 0.80
      recall_min: 0.70
      expected_count_min: 1
      expected_count_max: 10

  # P00004 — Todas las mediciones de la última jornada global.
  - regla: P00004_M00004
    identidad:
      estado: vigente
      descripcion: "Todas las mediciones de la última jornada de medición global (con y sin exceso del límite)."

    chunk_id:
      columns: [planta, punto_evaluacion]
      separator: "_"

    privacidad:
      pii_estrategia: tokens
      pii_tokens: [operador, tecnico]
      estrategia_olvido: borrar_chunk

    gobernanza:
      dimensiones:
        planta: column:planta
        ambito: seguridad_ocupacional
        clasificacion: interno
      dimensiones_en_texto: []

    vigencia:
      politica_vigencia: preservar
      hereda_chunks_de: []

    criterios_calidad:
      threshold: 0.80
      recall_min: 0.70
      expected_count_min: 1
      expected_count_max: 50
