# docker-compose.informes-consumir.yml — Suite E2E reportes M3
#
# Levanta MA + M3.
# MA (8001) y M3 (8005) se exponen al host para que pytest corra localmente.
#
# Prerrequisito: datos/minera.duckdb presente (dbt seed && dbt run).
# No requiere MASTER_SECRET (M3 no usa MV ni Qdrant).
#
# Uso (desde la raíz del repo minera):
#   docker compose -f docker-compose.informes-consumir.yml up -d
#   # esperar a M3 healthy, luego ejecutar pytest
#   docker compose -f docker-compose.informes-consumir.yml down --remove-orphans
#
# Variables de entorno:
#   ILLARI_TAG    — tag de imagen del registro (default: dev-0.7.3)
#   ILLARI_IMAGE  — nombre completo de imagen (override; p.ej. asistente-virtual:local).
#                   Si se define, omite el pull y usa esa imagen directamente.

x-base: &base
  image: ${ILLARI_IMAGE:-ghcr.io/asistente-agentico/illari:dev-0.7.3}
  volumes:
    - .:/cliente/minera
  networks: [red_illari]

services:

  ma:
    <<: *base
    entrypoint: uvicorn ma.api.main:app --host 0.0.0.0 --port 8001
    environment:
      CLIENTE_DIR: /cliente/minera
      # Hashes bcrypt (cost=4) de la contraseña de prueba 'abc'.
      # Los $$ son el escape de $ en docker compose (resultado: $2b$04$...).
      MA_USER_HASH_amVmZS5zZWd1cmlkYWRAdGVzdA: "$$2b$$04$$KHhwnErfSc0VE1qgTp7D2.FBFo4k2J5NFHZF0g3kyFYJhgWjO2ltC"
      MA_USER_HASH_b3BlcmFkb3IuY2hhbmNhZG9AdGVzdA: "$$2b$$04$$KHhwnErfSc0VE1qgTp7D2.FBFo4k2J5NFHZF0g3kyFYJhgWjO2ltC"
      MA_USER_HASH_YXVkaXRvci5hbWJpZW50YWxAdGVzdA: "$$2b$$04$$KHhwnErfSc0VE1qgTp7D2.FBFo4k2J5NFHZF0g3kyFYJhgWjO2ltC"
      MA_USER_HASH_dGVjbmljby5tZWRpb2FtYmllbnRlQHRlc3Q: "$$2b$$04$$KHhwnErfSc0VE1qgTp7D2.FBFo4k2J5NFHZF0g3kyFYJhgWjO2ltC"
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  m3:
    <<: *base
    entrypoint:
      - sh
      - -c
      - >-
        python -m m3.core.cli serve --dev --raiz /cliente/minera --host 0.0.0.0 --port 8005
    depends_on:
      ma:
        condition: service_healthy
    environment:
      CLIENTE_DIR: /cliente/minera
      MA_JWKS_URL: "http://ma:8001/jwks"
    ports:
      - "8005:8005"
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8005/health')"]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 15s

networks:
  red_illari:
    driver: bridge
